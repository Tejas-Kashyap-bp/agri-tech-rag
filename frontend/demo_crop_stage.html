<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo — Crop Stage Engine</title>
<link rel="stylesheet" href="/static/demo.css">
</head>
<body>
<header>
  <h1>Crop Stage Engine</h1>
  <div class="links">
    <a href="/demo">← All engines</a>
    <a href="/farm/crop-stage">Stage</a>
    <a href="/farm/fertilizer">Fertilizer</a>
    <a href="/farm/pest-risk">Pest Risk</a>
    <a href="/farm/ipm">IPM</a>
    <a href="/farm/yield">Yield</a>
  </div>
</header>
<main>
  <div class="panel">
    <h3>Inputs</h3>
    <div class="row">
      <div>
        <label for="month">Calendar window</label>
        <select id="month">
          <option>Dec–Feb (Dormant)</option>
          <option>March (Bud Break)</option>
          <option selected>Apr–May (Flowering)</option>
          <option>Jun–Aug (Fruit Dev.)</option>
          <option>Sep–Nov (Maturity)</option>
        </select>
      </div>
      <div>
        <label for="altitude">Altitude</label>
        <select id="altitude">
          <option>1000 ft</option>
          <option selected>3000 ft</option>
          <option>6000 ft</option>
        </select>
      </div>
    </div>
  </div>
  <button id="generate" class="generate" type="button">Generate advisory</button>
  <div id="output" class="output"><span class="muted">Pick inputs to run the engine.</span></div>
</main>
<script src="/static/demo_explain.js"></script>
<script src="/static/demo.js"></script>
<script>
  initDemo({
    endpoint: "/engine/crop-stage",
    fields: { month: "month", altitude: "altitude" },
  });
</script>
</body>
</html>
