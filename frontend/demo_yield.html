<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo — Yield Engine</title>
<link rel="stylesheet" href="/static/demo.css">
</head>
<body>
<header>
  <h1>Yield Engine</h1>
  <div class="links">
    <a href="/demo">← All engines</a>
    <a href="/farm/crop-stage">Stage</a>
    <a href="/farm/fertilizer">Fertilizer</a>
    <a href="/farm/pest-risk">Pest Risk</a>
    <a href="/farm/ipm">IPM</a>
    <a href="/farm/yield">Yield</a>
  </div>
</header>
<main>
  <div class="panel">
    <h3>Inputs</h3>
    <div class="row">
      <div>
        <label for="stage">Crop Stage (from Crop Stage Engine)</label>
        <select id="stage">
          <option>Dormant</option><option>Bud Break</option>
          <option>Flowering</option><option>Fruit Set</option>
          <option selected>Fruit Development</option><option>Maturity</option>
          <option>Post-Harvest</option>
        </select>
      </div>
      <div>
        <label for="trees">Tree Count</label>
        <select id="trees">
          <option>100</option>
          <option selected>200</option>
          <option>500</option>
        </select>
      </div>
      <div>
        <label for="field">Field Condition</label>
        <select id="field">
          <option selected>Healthy</option>
          <option>Moderate Stress</option>
          <option>Severe Stress</option>
        </select>
      </div>
    </div>
  </div>
  <button id="generate" class="generate" type="button">Generate advisory</button>
  <div id="output" class="output"><span class="muted">Pick inputs to run the engine.</span></div>
</main>
<script src="/static/demo_explain.js"></script>
<script src="/static/demo.js"></script>
<script>
  initDemo({
    endpoint: "/engine/yield",
    fields: { crop_stage: "stage", tree_count: "trees", field_condition: "field" },
  });
</script>
</body>
</html>
